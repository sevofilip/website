<!DOCTYPE html>
<html>
<head>
  <title>filip ševo</title>

  <link rel="icon" type="image/png" href="logo.jpg">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100svh;
      background: #fff;
      color: #111;
      font-family: Helvetica, Arial, sans-serif;

      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;

      opacity: 0;
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    p {
      margin: 0;
      font-size: 14px;
      letter-spacing: 1px;
      font-weight: 400;
      color: #111;
    }

    .name {
      letter-spacing: 1.6px;
    }

    .label {
      opacity: 1;
      letter-spacing: 1px;
      font-weight: 400;
    }

    a {
      color: #111;
      text-decoration: none;
      letter-spacing: 1px;
      transition: opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <p class="name">FILIP šEVO</p>
    <p class="label">creative consulting</p>
    <p>
      <a href="mailto:office@filipsevo.com">office@filipsevo.com</a>
    </p>
  </div>
</body>
</html>
